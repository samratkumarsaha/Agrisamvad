<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriSamvad Pro</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --accent: #2e7d32; --bg: #0f0f0f; --sidebar-bg: #0a0a0a;
            --card: #121212; --border: #282828; --text: #ffffff;
            --sub-text: #888888; --input-bg: #000000; --gps-off: #e74c3c;
        }
        [data-theme="light"] {
            --bg: #f5f5f5; --sidebar-bg: #ffffff; --card: #ffffff;
            --border: #dddddd; --text: #1a1a1a; --sub-text: #666666; --input-bg: #ffffff;
        }
        body { margin: 0; background-color: var(--bg); font-family: 'Segoe UI', sans-serif; color: var(--text); display: flex; height: 100vh; overflow: hidden; transition: 0.3s; }
        
        /* Auth */
        #auth-overlay { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .auth-box { background: var(--card); padding: 40px; border-radius: 16px; width: 320px; text-align: center; border: 1px solid var(--border); }
        .auth-box input, .settings-input { width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid #444; color: var(--text); border-radius: 8px; margin-bottom: 15px; outline: none; }
        .btn-primary { width: 100%; padding: 12px; background: var(--accent); border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* Sidebar */
        .sidebar { width: 220px; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: none; flex-direction: column; padding: 25px 15px; }
        .nav-item { padding: 14px; margin: 4px 0; border-radius: 10px; cursor: pointer; color: var(--sub-text); display: flex; align-items: center; gap: 12px; transition: 0.2s; }
        .nav-item.active { color: white; background: var(--accent); font-weight: bold; }
        .sidebar-footer { margin-top: auto; border-top: 1px solid var(--border); padding-top: 15px; }

        /* Main View */
        .main-content { flex: 1; display: none; flex-direction: column; overflow-y: auto; }
        .header { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; background: var(--sidebar-bg); border-bottom: 1px solid var(--border); }
        .user-greeting { font-size: 18px; font-weight: 600; color: var(--accent); }
        .theme-toggle { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 12px; }

        .container { max-width: 1000px; margin: 0 auto; padding: 30px; width: 100%; box-sizing: border-box; }
        .row { display: flex; gap: 20px; margin-bottom: 20px; }
        .card { background-color: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 25px; flex: 1; }
        .label { color: var(--sub-text); font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; }
        .value { font-size: 26px; font-weight: bold; }

        /* GPS Status Animation */
        .gps-indicator { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; background: var(--gps-off); }
        .gps-locked { background: #2ecc71; box-shadow: 0 0 10px #2ecc71; animation: blink 2s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .output-screen { background: #000; border: 1px solid #333; border-radius: 10px; padding: 20px; height: 50vh; overflow-y: auto; font-family: monospace; color: #00ff41; font-size: 13px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

    <!-- Auth Layer -->
    <div id="auth-overlay">
        <div class="auth-box">
            <h2 id="atitle" style="margin-bottom: 25px;">AgriSamvad</h2>
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn-primary" onclick="doAuth()" id="login-btn">Login</button>
            <p onclick="toggleA()" id="aswitch" style="color:var(--accent); cursor:pointer; font-size: 13px; margin-top:20px;">Register Account</p>
        </div>
    </div>

    <!-- App UI -->
    <div class="sidebar" id="sidebar">
        <h2 style="margin: 0 0 30px 10px; color: var(--accent);">AgriSamvad</h2>
        <div class="nav-item active" onclick="switchTab('dash', this)">🏠 Dashboard</div>
        <div class="nav-item" onclick="switchTab('analytics', this)">📈 Analytics</div>
        <div class="nav-item" onclick="switchTab('output-tab', this)">📟 Live Output</div>
        <div class="sidebar-footer">
            <div class="nav-item" onclick="switchTab('settings-tab', this)">⚙️ Settings</div>
            <div class="nav-item" onclick="location.reload()" style="color:#e74c3c">🚪 Logout</div>
        </div>
    </div>

    <div class="main-content" id="main-view">
        <div class="header">
            <div class="user-greeting" id="greeting">Hi, User</div>
            <button class="theme-toggle" onclick="toggleTheme()">🌓 Theme</button>
        </div>

        <div class="container">
            <div id="dash" class="tab-content active">
                <div class="row">
                    <div class="card"><div class="label">Moisture</div><div class="value" id="m-val">--%</div></div>
                    <div class="card"><div class="label">Humidity</div><div class="value" id="h-val">--%</div></div>
                </div>
                <div class="row">
                    <div class="card"><div class="label">Temperature</div><div class="value" id="t-val">--°C</div></div>
                    <div class="card">
                        <div class="label">GPS Status</div>
                        <div class="value" style="font-size: 18px;">
                            <span id="gps-dot" class="gps-indicator"></span>
                            <span id="gps-text">Searching...</span>
                        </div>
                    </div>
                </div>
            </div>

            <div id="analytics" class="tab-content">
                <div class="card" style="height: 400px;"><canvas id="chart"></canvas></div>
            </div>

            <div id="output-tab" class="tab-content">
                <div class="output-screen" id="monitor">Awaiting sensor stream...</div>
            </div>

            <div id="settings-tab" class="tab-content">
                <div class="card" style="max-width: 400px;">
                    <h3>Account Settings</h3>
                    <input type="text" id="set-user" class="settings-input" placeholder="New Username">
                    <input type="password" id="set-pass" class="settings-input" placeholder="New Password">
                    <button class="btn-primary" onclick="updateProfile()">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isLogin = true, currentUser = "";

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            document.documentElement.setAttribute('data-theme', current === 'light' ? 'dark' : 'light');
        }

        function toggleA() {
            isLogin = !isLogin;
            document.getElementById('atitle').innerText = isLogin ? "AgriSamvad" : "Register";
            document.getElementById('aswitch').innerText = isLogin ? "Register Account" : "Back to Login";
        }

        async function doAuth() {
            const u = document.getElementById('user').value, p = document.getElementById('pass').value;
            const r = await fetch('/auth', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({action: isLogin?'login':'create', user:u, pw:p})
            });
            const d = await r.json();
            if(d.status === "success") {
                if(isLogin) {
                    currentUser = d.user;
                    document.getElementById('greeting').innerText = `Hi, ${currentUser}`;
                    document.getElementById('auth-overlay').style.display = 'none';
                    document.getElementById('sidebar').style.display = 'flex';
                    document.getElementById('main-view').style.display = 'flex';
                    startMQTT();
                } else { alert("Created!"); toggleA(); }
            } else { alert(d.msg); }
        }

        function startMQTT() {
            const client = mqtt.connect('ws://broker.hivemq.com:8000/mqtt');
            client.on('connect', () => client.subscribe('agrisamvad/sensors'));
            client.on('message', (t, m) => {
                const raw = m.toString();
                document.getElementById('monitor').innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${raw}</div>`;
                document.getElementById('monitor').scrollTop = document.getElementById('monitor').scrollHeight;

                raw.split(',').forEach(p => {
                    const [k, v] = p.split(':');
                    if(k === 'M') document.getElementById('m-val').innerText = v + "%";
                    if(k === 'H') document.getElementById('h-val').innerText = v + "%";
                    if(k === 'T') document.getElementById('t-val').innerText = v + "°C";
                    if(k === 'G') {
                        document.getElementById('gps-dot').classList.add('gps-locked');
                        document.getElementById('gps-text').innerText = "Locked (" + v + ")";
                    }
                });
            });
        }

        async function updateProfile() {
            const nU = document.getElementById('set-user').value, nP = document.getElementById('set-pass').value;
            const r = await fetch('/update_profile', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({oldUser: currentUser, newUser: nU, newPw: nP})
            });
            const d = await r.json();
            if(d.status === "success") { currentUser = nU; document.getElementById('greeting').innerText = `Hi, ${currentUser}`; alert("Updated!"); }
        }

        function switchTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }
    </script>
</body>
</html>
